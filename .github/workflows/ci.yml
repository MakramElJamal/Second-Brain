# Runs the full test suite on every push/PR, on both supported platforms,
# against the pinned dependency set (requirements.lock) users actually install.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Matches the version the lockfile was generated with (pip freeze does
          # not record environment markers, so install on the same minor).
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install pinned dependencies + package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest tests/ -q
